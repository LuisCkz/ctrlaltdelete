<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shhh peruano chambeando</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #00ff88;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
      padding: 20px;
      animation: parpadeo 1.5s infinite;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff88;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
      line-height: 1.5;
    }

    @keyframes parpadeo {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .terminal {
      background-color: #1a1a1a;
      border: 1px solid #00ff88;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px #00ff88;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background-color: #00ff88;
      animation: blink 0.7s steps(2, start) infinite;
    }

    @keyframes blink {
      to {
        visibility: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="terminal">
    <h1> Web en mantenimiento</h1>
    <p>
      Estamos reforzando al server, parchando vulnerabilidade para que no caiga asi como tu caiste en sus mentiras.<br><br>
      Espéranos un toque... <br><strong>¡Se vienen cositas!</strong>
    </p>
    <p><span class="cursor">&nbsp;</span></p>
  </div>
</body>
</html>
